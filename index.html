<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LireMonde</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <div class="logo">LireMonde</div>

    <div class="links">
      <a href="#" id="btnAccueil">Accueil</a>
      <a href="#" id="btnALire">A lire</a>
      <a href="#" id="btnAdmin">Admin</a>
    </div>

    <input type="text" id="searchInput" placeholder="search" />
  </nav>

  <section id="pageAccueil">
    <main>
      <h1>Découvrez notre collection</h1>
      <p>Genre</p>
      <div id="filters"></div>
      <div id="books"></div>
    </main>
  </section>

  <section id="pageALire" class="hidden">
    <main>
      <h1>Ma liste de lecture</h1>
      <div id="aLireBooks"></div>
    </main>
  </section>

  <section id="pageAdmin" class="hidden">
    <main>
      <h1>Tableau Admin</h1>
      <button id="addBookBtn" type="button">Ajouter un livre</button>

      <table>
        <thead>
          <tr>
            <th>Couverture</th>
            <th>Titre</th>
            <th>Auteur</th>
            <th>Genre</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminTable"></tbody>
      </table>
    </main>
  </section>

  <div id="modal" class="hidden">
    <div class="modal-box">
      <button id="closeModal" type="button">X</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <div id="formModal" class="hidden">
    <div class="modal-box">
      <button id="closeForm" type="button" >X</button>

      <h2>Ajouter / Modifier</h2>

      <form id="bookForm">
        <input type="text" id="titre" placeholder="Titre" required />
        <input type="text" id="auteur" placeholder="Auteur" required />
        <input type="text" id="genre" placeholder="Genre" required />
        <input type="url" id="couverture" placeholder="URL image" required />
        <textarea id="description" placeholder="Description"></textarea>
        <button type="submit">Enregistrer</button>
      </form>
    </div>
  </div>

  <footer>© 2026 Liremonde - Tous droits réservés</footer>

  <script src="script.js"></script>
</body>
</html>
